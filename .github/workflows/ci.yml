# Monorepo CI for all workspace apps (admin-web, tutor-web, student-web, marketing-web, ucat-web, student-app, packages).
# PRs: Turborepo runs only affected packages vs the base branch. Push to main/develop: full run.
name: CI

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'supabase/migrations/**'
      - 'turbo.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/**'
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'supabase/migrations/**'
      - 'turbo.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Empty on push / workflow_dispatch → turbo runs all packages.
  TURBO_FILTER: ${{ github.event_name == 'pull_request' && format('...[origin/{0}]', github.base_ref) || '' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for Turborepo affected
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --no-tags

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.base_ref }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: List affected packages
        if: env.TURBO_FILTER != ''
        run: pnpm turbo run lint --filter="${{ env.TURBO_FILTER }}" --dry-run

      - name: Run linter
        run: |
          set -euo pipefail
          if [ -n "${{ env.TURBO_FILTER }}" ]; then
            pnpm turbo run lint --filter="${{ env.TURBO_FILTER }}"
          else
            pnpm turbo run lint
          fi

      - name: Check formatting
        continue-on-error: true
        run: |
          if command -v prettier >/dev/null 2>&1; then
            pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}" --ignore-path .gitignore || {
              echo "::warning::Code formatting issues found. Run 'pnpm format' to fix."
            }
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for Turborepo affected
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --no-tags

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.base_ref }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: |
          set -euo pipefail
          if [ -n "${{ env.TURBO_FILTER }}" ]; then
            pnpm turbo run typecheck --filter="${{ env.TURBO_FILTER }}"
          else
            pnpm turbo run typecheck
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for Turborepo affected
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --no-tags

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.base_ref }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          set -euo pipefail
          if [ -n "${{ env.TURBO_FILTER }}" ]; then
            pnpm turbo run test --filter="${{ env.TURBO_FILTER }}"
          else
            pnpm turbo run test
          fi

  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for Turborepo affected
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --no-tags

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.base_ref }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and apps
        run: |
          set -euo pipefail
          if [ -n "${{ env.TURBO_FILTER }}" ]; then
            pnpm turbo run build --filter="${{ env.TURBO_FILTER }}"
          else
            pnpm turbo run build
          fi
