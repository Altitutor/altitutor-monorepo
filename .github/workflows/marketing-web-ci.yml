name: Marketing Web CI

on:
  pull_request:
    paths:
      - "apps/marketing-web/**"
      - "packages/**"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/marketing-web-ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "apps/marketing-web/**"
      - "packages/**"
      - "turbo.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/marketing-web-ci.yml"
  workflow_dispatch:

concurrency:
  group: marketing-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate marketing-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter marketing-web lint

      - name: Type check
        run: pnpm --filter marketing-web typecheck

      - name: Build
        run: pnpm --filter marketing-web build
