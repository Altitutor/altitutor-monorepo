name: Supabase Deploy

on:
  push:
    branches: [develop, main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - 'supabase/scripts/**'
      - 'supabase/templates/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # deploy-config.sh uses this to pick default portal URLs and localhost auth redirects
      SUPABASE_CONFIG_ENV: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      # CLI version resolved from pnpm-lock.yaml (see supabase/setup-cli@v2)
      - uses: supabase/setup-cli@v2

      - name: Confirm Supabase CLI version
        run: supabase --version

      - name: Export CLI env (PROJECT_ID, DB_PASSWORD)
        run: |
          echo "SUPABASE_PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID }}" >> $GITHUB_ENV
          echo "SUPABASE_DB_PASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }}" >> $GITHUB_ENV

      - name: Link project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Push migrations
        # --include-all applies local migrations inserted before the remote's
        # latest version (e.g. 20260609110927 after prod already ran 2026060913*).
        run: supabase db push --include-all

      - name: Lint remote schema (post-push)
        run: supabase db lint --linked --level error --fail-on error

      - name: Deploy edge functions (if any)
        if: ${{ contains(github.event.head_commit.message, '[skip-functions]') == false }}
        run: |
          if [ -d "supabase/functions" ]; then
            for fn in $(ls supabase/functions); do
              supabase functions deploy --no-verify-jwt "$fn" --project-ref $SUPABASE_PROJECT_ID || true
            done
          fi

      - name: Deploy configuration
        run: |
          echo "📝 Deploying configuration changes..."
          cd supabase
          ./scripts/deploy-config.sh $SUPABASE_PROJECT_ID
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Install jq (for email template deployment)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy email templates
        run: |
          echo "📧 Deploying email templates..."
          cd supabase
          chmod +x ./scripts/deploy-email-templates.sh
          ./scripts/deploy-email-templates.sh $SUPABASE_PROJECT_ID
