name: Student Web Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/student-web/**'
      - 'packages/**'
      - 'turbo.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-
      
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter=student-web
      # TODO: Add deploy step (e.g., Vercel, Docker push, etc.)


